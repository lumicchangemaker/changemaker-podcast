<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressum — CHANGEMAKER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      color: #0d0d0d;
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 80px;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #999;
      text-decoration: none;
      margin-bottom: 48px;
      transition: color 0.15s;
    }

    .back:hover { color: #0d0d0d; }

    h1 {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 40px;
    }

    .section {
      margin-bottom: 32px;
    }

    .section h2 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 10px;
    }

    .section p {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.7;
      color: #333;
    }

    .section a {
      color: #0d0d0d;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: #e6ff2d;
    }
  </style>
</head>
<body>

  <div class="wrap">

    <a href="/" class="back">← Zurück zur Startseite</a>

    <h1>Impressum</h1>

    <div class="section">
      <h2>Diensteanbieter</h2>
      <p>
        Diensteanbieter im Sinne des § 5 TMG:<br>
        Lumic Media LLC<br>
        3833 Powerline Rd Suite 201<br>
        Fort Lauderdale, FL 33309, US
      </p>
    </div>

    <div class="section">
      <h2>Kontakt</h2>
      <p>
        E-Mail: <a href="mailto:leon@lumicmedia.com">leon@lumicmedia.com</a><br>
        Telefon: <a href="tel:+491764381411">+49 176 4381411</a>
      </p>
    </div>

  </div>

  <div class="bar"></div>

</body>
</html>
